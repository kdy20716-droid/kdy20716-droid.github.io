<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="color-scheme" content="light only" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:," />
    <!-- 포트폴리오 아이콘(파비콘) 자동 생성 스크립트 -->
    <script>
      (function setPortfolioFavicon() {
        const canvas = document.createElement("canvas");
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext("2d");

        // 1. 배경 (둥근 사각형 - 어두운 회색)
        ctx.fillStyle = "#333";
        ctx.beginPath();
        // 브라우저 호환성을 위해 roundRect가 없으면 rect로 대체
        if (ctx.roundRect) {
          ctx.roundRect(4, 4, 56, 56, 16);
        } else {
          ctx.rect(4, 4, 56, 56);
        }
        ctx.fill();

        // 2. 텍스트 (P - 흰색)
        ctx.fillStyle = "white";
        ctx.font = "bold 40px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("P", 32, 34); // 중앙 정렬

        // 3. 파비콘 적용
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
          link = document.createElement("link");
          link.rel = "icon";
          document.head.appendChild(link);
        }
        link.href = canvas.toDataURL();
      })();
    </script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #1a1a2e, #16213e, #243b55, #1a1a2e);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: white;
        font-family: "Noto Sans KR", sans-serif;
        color-scheme: light;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        text-align: center;
        padding: 40px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 1200px;
        width: 90%;
      }

      h1 {
        margin-bottom: 40px;
        font-size: 2.5rem;
        font-weight: 900;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        background: linear-gradient(to right, #fff, #aaa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .game-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 20px;
        width: 100%;
      }

      .game-card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        color: white;
        padding: 20px;
        border-radius: 15px;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.1);
        height: 250px;
        opacity: 0.85;
      }

      .game-card:hover {
        transform: translateY(-10px);
        opacity: 1;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.8);
      }

      .game-card .icon {
        font-size: 60px;
        margin-right: 0;
        margin-bottom: 20px;
      }

      .game-card .info {
        text-align: center;
      }

      .game-card .title {
        display: block;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 5px;
      }

      .game-card .desc {
        display: block;
        font-size: 0.9rem;
        opacity: 0.8;
      }

      /* 라이어 룰렛 스타일 */
      .liar {
        background: linear-gradient(45deg, #8e0e00, #1f1c18);
      }
      .liar:hover {

      }

      /* 수박 게임 스타일 */

      }

      /* 포켓볼 스타일 */

      }

        border-color: #a18cd1;
      }

      /* 3D 슈팅 게임 스타일 */

      }

      .tetris:hover {
        border-color: #f27121;
      }

  <body>
    <div class="container">
      <h1>🎮 GAME PROJECT</h1>
      <div class="game-list">
        <a href="./suika/suika.html" class="game-card suika">
          <span class="icon">🍉</span>
          <div class="info">
            <span class="title">수박 게임</span>
            <span class="desc">과일을 합쳐 수박을 만들어보세요!</span>

        </a>
        <a href="./liars-roulette/liars-roulette.html" class="game-card liar">
          <span class="icon">🔫</span>
          <div class="info">
            <span class="title">라이어 룰렛</span>
            <span class="desc">심리전과 운의 대결, 최후의 승자는?</span>
          </div>
        </a>

        <a href="./pocket-ball/pocket-ball.html" class="game-card pocketball">
          <span class="icon">🎱</span>
          <div class="info">
            <span class="title">포켓볼</span>
            <span class="desc">정교한 샷으로 공을 넣으세요!</span>
          </div>
        </a>
        <a href="./tetris/tetris.html" class="game-card tetris">
          <span class="icon">🧱</span>
          <div class="info">
            <span class="title">테트리스</span>
            <span class="desc">블록을 맞춰 줄을 없애보세요!</span>

      <h2
        style="
          margin-top: 50px;
          font-size: 1.5rem;
          color: #ff5252;
          text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        "
      >
        🔒 비밀번호를 입력해서 플레이하시오
      </h2>
      <div class="game-list">
        <a href="./shooting/shooting.html" class="game-card shooting protected">
          <span class="icon">🧟</span>
          <div class="info">
            <span class="title">3D Shooting Game</span>
            <span class="desc"
              >(클로즈베타)다가오는 적들을 처치하고 생존하세요!</span
            >
          </div>
        </a>
        <a href="./vampire/survival.html" class="game-card vampire protected">
          <span class="icon">💼</span>
          <div class="info">
            <span class="title">Office Survivor</span>
            <span class="desc"
              >(클로즈베타)쏟아지는 업무를 쳐내며 칼퇴하세요!</span
            >
          </div>
        </a>
      </div>
    </div>
    <script>
      // 간단한 효과음 생성기 (Web Audio API)
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function playTone(freq, type, duration) {
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + duration,
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      }

      // 호버 사운드 (가벼운 틱 소리)
      function playHoverSound() {
        playTone(800, "sine", 0.1);
      }

      // 클릭 사운드 (확인 비프음)
      function playClickSound() {
        playTone(600, "triangle", 0.15);
      }

      const cards = document.querySelectorAll(".game-card");

      // 마우스 오버 및 클릭 시 사운드 재생 효과만 유지
      cards.forEach((card) => {
        card.addEventListener("mouseenter", () => {
          playHoverSound();
        });
        card.addEventListener("click", (e) => {
          e.preventDefault();
          playClickSound();

          if (card.classList.contains("protected")) {
            const pw = prompt("비밀번호를 입력하세요:");
            if (pw === "goddoyeon") {
              setTimeout(() => {
                window.location.href = card.getAttribute("href");
              }, 200);
            } else if (pw !== null) {
              alert("비밀번호가 틀렸습니다.");
            }
          } else {
            setTimeout(() => {
              window.location.href = card.getAttribute("href");
            }, 200);
          }
        });
      });
    </script>
  </body>
